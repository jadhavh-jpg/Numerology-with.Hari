<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Numerology With Hari</title>

<style>
:root{
  --primary:#0F172A;
  --accent:#7C3AED;
  --bg:#F8FAFC;
  --card:#ffffff;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
}

/* MOBILE APP STYLE NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid #eee;
  z-index:999;
}
.bottom-nav a{
  text-decoration:none;
  color:#111;
  font-size:14px;
}

/* HERO */
.hero{
  padding:40px 15px 100px;
  text-align:center;
}

.hero h1{
  font-size:28px;
}

.hero span{
  color:var(--accent);
}

/* IMAGE ANIMATION */
.hero-image{
  position:relative;
  height:260px;
  margin-top:20px;
  border-radius:20px;
  overflow:hidden;
}

.hero-image img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transform:translateX(100%);
  transition:1s;
}

.hero-image img.active{
  opacity:1;
  transform:translateX(0);
}

/* CARD */
.card{
  background:var(--card);
  margin:15px;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 20px rgba(0,0,0,0.05);
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:10px;
}

/* SECTION */
.section{
  padding-bottom:100px;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>Unlock Your Destiny<br><span>With Numbers</span></h1>
  <p>Naam, DOB aur mobile number — sab kuch life decide karta hai</p>

  <div class="hero-image">
    <img src="hero1.png" class="active">
    <img src="hero2.png">
    <img src="hero3.png">
  </div>
</section>

<!-- TOOLS -->
<div class="section">

<div class="card">
  <h3>📱 Mobile Calculator</h3>
  <input id="mobile">
  <button onclick="calcMobile()">Check</button>
  <p id="mobileResult"></p>
</div>

<div class="card">
  <h3>🔤 Name Calculator</h3>
  <input id="name">
  <button onclick="calcName()">Check</button>
  <p id="nameResult"></p>
</div>

<div class="card">
  <h3>📆 DOB Calculator</h3>
  <input type="date" id="dob">
  <button onclick="calcDOB()">Check</button>
  <p id="dobResult"></p>
</div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <a href="#">🏠 Home</a>
  <a href="#">🧮 Tools</a>
  <a href="#">💬 WhatsApp</a>
  <a href="#">👤 Login</a>
</div>

<script>
// HERO ANIMATION (SLIDE EFFECT)
const slides = document.querySelectorAll(".hero-image img");
let i = 0;

setInterval(()=>{
  slides[i].classList.remove("active");
  i = (i + 1) % slides.length;
  slides[i].classList.add("active");
},2500);

// CALCULATIONS
function calcMobile(){
  let n=mobile.value,s=0;
  for(let i=0;i<n.length;i++) if(!isNaN(n[i])) s+=+n[i];
  while(s>9) s=s.toString().split('').reduce((a,b)=>+a+ +b);
  mobileResult.innerText="Number: "+s;
}

function calcName(){
  let n=name.value.toUpperCase(),s=0;
  for(let i=0;i<n.length;i++) if(n[i]>='A') s+=n.charCodeAt(i)-64;
  while(s>9) s=s.toString().split('').reduce((a,b)=>+a+ +b);
  nameResult.innerText="Number: "+s;
}

function calcDOB(){
  let d=dob.value.replaceAll("-",""),s=0;
  for(let i=0;i<d.length;i++) s+=+d[i];
  while(s>9) s=s.toString().split('').reduce((a,b)=>+a+ +b);
  dobResult.innerText="Life Path: "+s;
}
</script>

</body>
</html>
